name: Release language wrappers

# Publishes the Python, Rust, and Dart wrappers to their language-native
# registries on every `v*` tag push. The native library is *not* bundled —
# wrappers are thin FFI/ctypes shims over the C ABI in `src/stelnet_c_api.cpp`,
# matching whisper.cpp's binding pattern. Users install `libstelnet` separately
# (Homebrew, apt, or build from source).
#
# IMPORTANT: registries reject the very first publish from a CI flow because
# they have no prior owner to verify against — the first version of each
# package must be uploaded manually. Bootstrap procedure + per-registry
# config requirements are documented in PLAN.md §66. After bootstrap, every
# tag push auto-publishes via this workflow.
#
# Prerequisites (one-time setup before the first tag):
#   - PyPI:     configure a trusted publisher at
#               https://pypi.org/manage/account/publishing/ pointing to this repo
#               + workflow file + the `pypi` environment.
#   - crates.io: add `CARGO_REGISTRY_TOKEN` repo secret (cargo login token)
#               AND manually `cargo publish` v0 of stelnet-sys + stelnet
#               from a workstation first.
#   - pub.dev:  manually `dart pub publish` v0 from `flutter/stelnet`
#               (interactive: browser login + accept). Then enable
#               automated publishing at
#               https://pub.dev/packages/stelnet/admin pointing to this repo
#               + tag pattern `v{{version}}`.
#
# Each job below uses `continue-on-error: true` so a single misconfigured
# registry doesn't fail the whole workflow — the others still attempt to
# publish. Each job also runs a fast precheck that prints a clear
# "skipping: <registry> not configured" message instead of letting `cargo`
# / `twine` emit cryptic auth errors deep in the log.

# Auto-trigger on tag push is DISABLED until the per-registry bootstrap
# documented in PLAN.md §66 is complete (none of stelnet-sys / stelnet
# / pub.dev/stelnet exist on their respective registries yet, so every
# auto-run since v0.5.0 has failed). The workflow stays here so we can
# manually dispatch a publish from the Actions UI for ad-hoc testing
# during the bootstrap, and so we can flip the trigger back on (uncomment
# `push: tags: ['v*']` below) the moment bootstrap is done.
on:
  # push:
  #   tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.5.1)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-pypi:
    name: Publish Python wrapper to PyPI
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: pypi
      url: https://pypi.org/p/stelnet
    permissions:
      id-token: write  # for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      # Probe whether the trusted publisher is configured AND the package
      # exists. Brand-new packages need either a "pending publisher"
      # bootstrap on PyPI's side (https://pypi.org/manage/account/publishing/)
      # or an existing package with a publisher mapping. We can't check the
      # OIDC config from inside the job, but we CAN check whether the
      # package exists; if it 404s the bootstrap is missing.
      - name: PyPI bootstrap check
        id: pypi_check
        run: |
          if curl -sf -o /dev/null https://pypi.org/pypi/stelnet/json; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::PyPI package 'stelnet' does not exist yet."
            echo "::warning::See PLAN.md §66 for bootstrap steps."
            echo "::warning::Note: a configured pending-publisher CAN bootstrap PyPI; this run will still try."
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build sdist + wheel
        run: |
          cd python
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  publish-crates-io:
    name: Publish Rust wrapper to crates.io
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      # Fail fast (and clearly) if the token isn't set, instead of letting
      # cargo emit the obscure "please provide a non-empty token" message.
      - name: crates.io config check
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN secret not set — see PLAN.md §66 for setup."
            echo "skipping crates.io publish."
            exit 78  # neutral exit (some setups treat as 'skipped')
          fi
          if ! curl -sf -o /dev/null https://crates.io/api/v1/crates/stelnet-sys; then
            echo "::warning::crates.io package 'stelnet-sys' does not exist yet."
            echo "::warning::First publish must be manual (see PLAN.md §66 bootstrap)."
            echo "skipping crates.io publish."
            exit 78
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # stelnet-sys must be on crates.io before stelnet can resolve its
      # path dependency. We rewrite the path dep to a version dep before
      # publishing the high-level crate.
      - name: Publish stelnet-sys
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --manifest-path stelnet-sys/Cargo.toml --allow-dirty

      - name: Wait for stelnet-sys to index
        run: sleep 30

      - name: Publish stelnet
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --manifest-path stelnet/Cargo.toml --allow-dirty

  publish-pub-dev:
    name: Publish Dart wrapper to pub.dev
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      id-token: write  # for pub.dev OIDC publishing
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      # pub.dev's automated publishing requires the package to already
      # exist (the very first `dart pub publish` for a brand-new package
      # is interactive only). Probe and bail fast if the package is
      # missing.
      - name: pub.dev bootstrap check
        run: |
          if ! curl -sf -o /dev/null https://pub.dev/api/packages/stelnet; then
            echo "::warning::pub.dev package 'stelnet' does not exist yet."
            echo "::warning::First publish must be manual + interactive (see PLAN.md §66)."
            echo "skipping pub.dev publish."
            exit 78
          fi

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Publish
        working-directory: flutter/stelnet
        run: |
          dart pub get
          dart pub publish --force
